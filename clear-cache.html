<!doctype html><html><body style="font-family:Arial;padding:30px"><h2>The CPD Tracker - Clear Cache</h2><button style="font-size:20px;padding:12px 20px;border-radius:10px;background:#2563eb;color:white;border:0" onclick="clearIt()">Clear Cache</button><script>async function clearIt(){if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();for(const r of regs){await r.unregister();}}if('caches'in window){const keys=await caches.keys();for(const k of keys){await caches.delete(k);}}alert('Cache cleared. Close this tab and reopen the site.');}</script></body></html>
